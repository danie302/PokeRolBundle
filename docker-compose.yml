version: "3.9"

services:
  poke-rol-api:
    build:
      context: ./PokeRolApi
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    links:
      - poke-rol-db
    depends_on:
      - poke-rol-db
    volumes:
      - ./PokeRolApi/src/:/app/src
  poke-rol-ui:
    build:
      context: ./PokeRolUI
      dockerfile: Dockerfile
    ports:
      - "5173:5173" 
    links:
      - poke-rol-api
    depends_on:
      - poke-rol-api
    volumes:
      - ./PokeRolUI/src/:/app/src
      - ./PokeRolUI/public/:/app/public
      - ./PokeRolUI/index.html:/app/index.html

  poke-rol-db:
    image: mongo:latest
    environment:
      MONGO_INITDB_ROOT_USERNAME: poke-master
      MONGO_INITDB_ROOT_PASSWORD: pokeplayer321
    ports:
      - "27017:27017"
    volumes:
      - poke-rol-db-data:/data/db

volumes:
  poke-rol-db-data:
